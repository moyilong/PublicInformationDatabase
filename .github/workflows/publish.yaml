name: publish nuget

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0

      - name: Build & Publish
        run: |
          dotnet restore
          dotnet build -c Release
          find -type f | grep \.nupkg$ | while read line ; do
            dotnet nuget push $line --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          done
